<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>联系我们 - 云创科技</title>
  <meta name="description" content="联系云创科技,获取网站建设、移动开发、技术咨询方案。电话400-000-1234,邮箱hello@yuncreate.tech。">
  <meta name="keywords" content="联系云创科技,企业网站建设咨询,技术咨询联系方式">
  
  <meta property="og:title" content="云创科技 - 联系我们">
  <meta property="og:description" content="获取专属数字化转型方案,我们将在24小时内联系您。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.jiajiawen.xyz/contact.html">
  
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <!-- 1. 导航栏 -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">云</span>
        云创科技
      </a>
      <button class="nav-toggle" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">首页</a></li>
        <li><a href="services.html" class="nav-link">服务</a></li>
        <li><a href="cases.html" class="nav-link">案例</a></li>
        <li><a href="contact.html" class="nav-link active">联系我们</a></li>
      </ul>
    </div>
  </nav>

  <!-- 2. 页面标题区 -->
  <section class="page-header">
    <div class="container">
      <h1 class="page-title">联系我们</h1>
      <p class="page-subtitle">期待与您的合作，让我们一起开启数字化之旅</p>
    </div>
  </section>

  <!-- 3. 联系内容布局 -->
  <section class="tabs-section">
    <div class="container">
      <div class="contact-layout">
        <!-- 左栏 - 联系表单 -->
        <div class="contact-form">
          <form id="contactForm">
            <div class="form-group">
              <label for="name">姓名</label>
              <input type="text" id="name" name="name" placeholder="wenjiajia">
              <span class="error-msg">请输入姓名</span>
            </div>

            <div class="form-group">
              <label for="email">邮箱</label>
              <input type="email" id="email" name="email" placeholder="3326937901@qq.com">
              <span class="error-msg">请输入正确邮箱格式</span>
            </div>

            <div class="form-group">
              <label for="company">公司</label>
              <input type="text" id="company" name="company" placeholder="家里蹲有限公司">
            </div>

            <div class="form-group">
              <label for="serviceType">需求类型</label>
              <select id="serviceType" name="serviceType">
                <option value="网站建设">网站建设</option>
                <option value="移动开发">移动开发</option>
                <option value="技术咨询">技术咨询</option>
                <option value="其他">其他</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">留言</label>
              <textarea id="message" name="message" placeholder="请描述您的需求，至少 10 个字"></textarea>
              <span class="error-msg">请至少输入 10 个字</span>
            </div>

            <button type="submit" class="btn-submit">提交</button>
            <div class="success-message">
              ✓ 提交成功！我们将在 24 小时内联系您
            </div>
          </form>
        </div>

        <!-- 右栏 - 联系信息 -->
        <div class="contact-info">
          <h3>联系方式</h3>
          
          <div class="info-item">
            <span class="info-icon">📍</span>
            <span class="info-text">广州市广州中学</span>
          </div>

          <div class="info-item">
            <span class="info-icon">📧</span>
            <span class="info-text">
              <a href="mailto:hello@yuncreate.tech">hello@yuncreate.tech</a>
            </span>
          </div>

          <div class="info-item">
            <span class="info-icon">📞</span>
            <span class="info-text">
              <a href="tel:400-000-1234">400-000-1234</a>
            </span>
          </div>

          <div class="info-item">
            <span class="info-icon">🕐</span>
            <span class="info-text">周一至周五 9:00-18:00</span>
          </div>
        </div>
      </div>

      <!-- 4. 地图占位区 -->
      <div class="map-placeholder">
        <div class="map-icon">📍</div>
        <div class="map-text">北京市朝阳区科技园路 88 号</div>
      </div>
    </div>
  </section>

  <!-- 5. 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-logo">云创科技</div>
        <p class="footer-tagline">让数字化更简单</p>
        <div class="footer-links">
          <a href="index.html" class="footer-link">首页</a>
          <a href="services.html" class="footer-link">服务</a>
          <a href="cases.html" class="footer-link">案例</a>
          <a href="contact.html" class="footer-link">联系我们</a>
        </div>
        <p class="footer-copyright">&copy; 2026 云创科技. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <!-- ====== 增强：返回顶部按钮 ====== -->
  <button id="back-to-top" title="返回顶部" aria-label="返回顶部">↑</button>

  <script src="script.js" defer></script>
</body>
</html>
